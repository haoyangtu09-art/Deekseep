  <g transform="translate(965 178)" filter="url(#shadow)">
    <rect width="226" height="304" rx="36" fill="#0f172a" stroke="#93c5fd" stroke-opacity="0.28" stroke-width="2"/>
    <rect x="30" y="36" width="112" height="16" rx="8" fill="#f8fafc" fill-opacity="0.88"/>
    <rect x="30" y="67" width="162" height="9" rx="4.5" fill="#94a3b8" fill-opacity="0.55"/>
    <g transform="translate(30 112)">
