      <rect width="166" height="46" rx="15" fill="#1e293b"/>
      <rect x="124" y="12" width="28" height="22" rx="11" fill="#6366f1"/>
      <circle cx="141" cy="23" r="8" fill="#e0e7ff"/>
    </g>
    <g transform="translate(30 232)">
      <rect width="166" height="42" rx="14" fill="url(#accent)" opacity="0.9"/>
      <circle cx="30" cy="21" r="7" fill="#ffffff" fill-opacity="0.92"/>
