  <text x="88" y="564" fill="#94a3b8" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" letter-spacing="0.5">Account · chat · image · developer tools</text>
</svg>
